# Driver categories. Kernel module configuration (mkinitcpio, modeset)
# lives in the nvidia-modules / amd-modules tasks shown in the same menu.
# ASUS ROG/TUF tooling (g14 repo, services) is still pending.

[[category]]
id = "amd"
condition = "gpu:amd"

  [[category.packages]]
  name = "mesa"
  post_msg = "msg.gpu_modules_hint"

  [[category.packages]]
  name = "lib32-mesa"

  [[category.packages]]
  name = "xf86-video-amdgpu"

  [[category.packages]]
  name = "vulkan-radeon"

  [[category.packages]]
  name = "lib32-vulkan-radeon"

  [[category.packages]]
  name = "libva-mesa-driver"

  [[category.packages]]
  name = "lib32-libva-mesa-driver"

  [[category.packages]]
  name = "mesa-vdpau"

  [[category.packages]]
  name = "lib32-mesa-vdpau"

[[category]]
id = "nvidia"
condition = "gpu:nvidia"

  [[category.packages]]
  name = "nvidia"
  note = { tr = "Kapalı kaynak, linux çekirdeği için", en = "Proprietary, for the linux kernel" }
  default = false

  [[category.packages]]
  name = "nvidia-lts"
  note = { tr = "Kapalı kaynak, linux-lts için", en = "Proprietary, for linux-lts" }
  default = false

  [[category.packages]]
  name = "nvidia-dkms"
  note = { tr = "Kapalı kaynak, tüm çekirdekler (DKMS)", en = "Proprietary, any kernel (DKMS)" }
  default = false

  [[category.packages]]
  name = "nvidia-open"
  note = { tr = "Açık çekirdek modülü, linux için", en = "Open kernel module, for linux" }
  default = false

  [[category.packages]]
  name = "nvidia-open-dkms"
  note = { tr = "Açık çekirdek modülü, tüm çekirdekler (DKMS)", en = "Open kernel module, any kernel (DKMS)" }

  [[category.packages]]
  name = "nvidia-utils"
  post_msg = "msg.gpu_modules_hint"

  [[category.packages]]
  name = "lib32-nvidia-utils"

  [[category.packages]]
  name = "nvidia-settings"

  [[category.packages]]
  name = "egl-wayland"

  [[category.packages]]
  name = "libva-nvidia-driver"
  note = { tr = "VA-API donanım hızlandırma", en = "VA-API hardware acceleration" }

[[category]]
id = "sound"

  [[category.packages]]
  name = "wireplumber"

  [[category.packages]]
  name = "pipewire"

  [[category.packages]]
  name = "pipewire-alsa"

  [[category.packages]]
  name = "pipewire-pulse"

  [[category.packages]]
  name = "pipewire-jack"

  [[category.packages]]
  name = "pipewire-v4l2"

  [[category.packages]]
  name = "pipewire-zeroconf"

  [[category.packages]]
  name = "pipewire-x11-bell"
  default = false

  [[category.packages]]
  name = "easyeffects"
  default = false

  [[category.packages]]
  name = "jamesdsp-pipewire-bin"
  aur = true
  default = false
